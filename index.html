<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual de Convivencia y Conexion</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --surface: #fffaf4;
      --surface-2: #f1fbf8;
      --ink: #24201d;
      --muted: #746b63;
      --line: #ded3c4;
      --rose: #c94d6d;
      --rose-2: #f7d8df;
      --teal: #0f766e;
      --mint: #cfeee6;
      --gold: #b58123;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(36, 32, 29, .12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(201, 77, 109, .16), transparent 28rem),
        linear-gradient(135deg, var(--bg), #eef8f5 58%, #fff8ec);
      color: var(--ink);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 40px;
      padding: 0 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 118, 110, .45);
      box-shadow: 0 8px 22px rgba(15, 118, 110, .12);
    }

    button.primary {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    button.ghost {
      background: transparent;
    }

    button.icon {
      width: 40px;
      padding: 0;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
      min-height: 42px;
    }

    textarea {
      resize: vertical;
      min-height: 96px;
      line-height: 1.45;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .16);
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .shell {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      padding: 24px 18px;
      background: rgba(255, 250, 244, .82);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(222, 211, 196, .8);
      overflow: auto;
    }

    .brand {
      display: grid;
      gap: 8px;
      padding: 0 8px 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.12;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .nav button {
      justify-content: flex-start;
      width: 100%;
      min-height: 38px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      text-align: left;
    }

    .nav button.active {
      color: var(--ink);
      background: var(--mint);
      border-color: rgba(15, 118, 110, .22);
      font-weight: 800;
    }

    .main {
      min-width: 0;
      padding: 24px clamp(16px, 3vw, 38px) 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .status {
      display: grid;
      gap: 7px;
      min-width: min(420px, 100%);
    }

    .status strong {
      font-size: 14px;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      background: rgba(36, 32, 29, .11);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--rose));
      transition: width .25s ease;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .section {
      display: none;
      animation: rise .22s ease both;
    }

    .section.active {
      display: grid;
      gap: 18px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-head {
      display: grid;
      gap: 9px;
      max-width: 980px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.55;
    }

    .panel {
      background: rgba(255, 250, 244, .9);
      border: 1px solid rgba(222, 211, 196, .9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(16px, 2.4vw, 26px);
      display: grid;
      gap: 18px;
    }

    .panel h3 {
      margin: 0;
      font-size: 18px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(180px, .9fr) minmax(0, 1fr) minmax(0, 1fr) 148px;
      gap: 10px;
      align-items: end;
      padding: 10px;
      border: 1px solid rgba(222, 211, 196, .75);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .56);
    }

    .row-head {
      color: var(--ink);
      font-weight: 800;
      line-height: 1.25;
      padding-bottom: 11px;
    }

    .table-list {
      display: grid;
      gap: 10px;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr .75fr 44px;
      gap: 10px;
      align-items: end;
      padding: 10px;
      border: 1px solid rgba(222, 211, 196, .75);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .58);
    }

    .item-row.wide {
      grid-template-columns: 1.3fr .9fr .8fr .8fr 44px;
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--rose);
    }

    .range-value {
      min-width: 34px;
      height: 34px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--rose-2);
      color: #8a2640;
      font-weight: 900;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .kpi {
      border: 1px solid rgba(222, 211, 196, .85);
      border-radius: var(--radius);
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 4px;
    }

    .kpi span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .kpi strong {
      font-size: 28px;
      line-height: 1;
    }

    .quote {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.28;
      color: #6e263a;
      background: #fff;
      border-left: 5px solid var(--rose);
      padding: 20px;
      border-radius: var(--radius);
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    #printView {
      display: none;
    }

    .print-page {
      background: #fff;
      color: #201b18;
      padding: 36px;
      max-width: 920px;
      margin: 0 auto 24px;
      border: 1px solid #ddd;
    }

    .print-page h1, .print-page h2, .print-page h3 {
      margin: 0 0 10px;
      letter-spacing: 0;
    }

    .print-page h1 {
      font-size: 32px;
      color: #9b2f4b;
    }

    .print-page h2 {
      margin-top: 28px;
      color: #0d605a;
      border-bottom: 2px solid #d9eee9;
      padding-bottom: 6px;
    }

    .print-page dl {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 8px 14px;
      margin: 12px 0;
    }

    .print-page dt {
      font-weight: 800;
    }

    .print-page dd {
      margin: 0;
      white-space: pre-wrap;
    }

    .print-page table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 18px;
      font-size: 13px;
    }

    .print-page th, .print-page td {
      border: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
      padding: 7px;
    }

    .print-page th {
      background: #f1fbf8;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: var(--ink);
      color: #fff;
      padding: 12px 14px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(222, 211, 196, .8);
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .grid.two, .grid.three, .kpi-grid {
        grid-template-columns: 1fr;
      }

      .field-row, .item-row, .item-row.wide {
        grid-template-columns: 1fr;
      }

      .row-head {
        padding-bottom: 0;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .shell, .toast {
        display: none !important;
      }

      #printView {
        display: block;
      }

      .print-page {
        border: 0;
        padding: 0;
        margin: 0;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Manual de Convivencia y Conexion</h1>
        <p>Aplicacion de captura</p>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="status">
          <strong id="progressLabel">0% completado</strong>
          <div class="meter"><span id="progressBar"></span></div>
        </div>
        <div class="actions">
          <button class="ghost" id="previewBtn" title="Vista imprimible">▣ Vista</button>
          <button id="exportJsonBtn" title="Descargar datos">⇩ JSON</button>
          <button id="exportCsvBtn" title="Descargar tabla">⇩ CSV</button>
          <button id="importBtn" title="Cargar datos">⇧ Importar</button>
          <button class="primary" id="printBtn" title="Imprimir o guardar PDF">⎙ Imprimir</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
      </div>
      <div id="sections"></div>
    </main>
  </div>

  <div id="printView"></div>
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "manual-convivencia-v1";

    const personFields = [
      ["nombre", "Nombre / Apodo", "text"],
      ["nacimiento", "Fecha de nacimiento", "date"],
      ["amo", "Lo que mas amo de ti", "textarea"],
      ["compromiso", "Mi compromiso contigo", "textarea"]
    ];

    const profileFields = [
      ["personalidad", "Personalidad", "textarea"],
      ["lenguaje", "Lenguaje del amor", "textarea"],
      ["likes", "Likes", "textarea"],
      ["dislikes", "Dislikes", "textarea"],
      ["negociables", "Negociables", "textarea"],
      ["noNegociables", "No negociables", "textarea"],
      ["metas", "Metas personales", "textarea"],
      ["miedos", "Miedos / inseguridades", "textarea"],
      ["muestraAmor", "Como muestro amor", "textarea"],
      ["conflicto", "Como reacciono al conflicto", "textarea"]
    ];

    const loveBlocks = [
      ["afirmacion", "Palabras de afirmacion"],
      ["regalos", "Regalos / detalles"],
      ["contacto", "Contacto fisico"],
      ["tiempo", "Tiempo de calidad"],
      ["servicio", "Actos de servicio"]
    ];

    const agreementGroups = {
      tiempo: ["Tiempo juntos: minimo X horas/semana", "Tiempo individual: minimo X horas/semana", "Horario de sueno respetado", "Uso del celular en pareja", "Dias de cita obligatoria"],
      hogar: ["Cocinar", "Limpiar / barrer", "Compras del mercado", "Lavar ropa", "Orden general"],
      finanzas: ["Gastos compartidos", "Presupuesto para salidas/citas", "Presupuesto para viajes", "Ahorros conjuntos", "Quien administra que"],
      privacidad: ["Politica de fotos juntos en redes", "Nivel de privacidad acordado", "Amigos/contactos que ambos respetan", "Tiempo de respuesta maximo", "Reglas sobre ex-parejas"],
      familia: ["Frecuencia de visitas a familias", "Conflictos con familia politica", "Salidas independientes con amigos", "Inclusion en planes sociales", "Limites con terceros"]
    };

    const ritualGroups = {
      diarios: ["Buenos dias con palabras de amor", "Check-in de 5 min", "Buenas noches con un abrazo"],
      semanales: ["Cita semanal", "Noche de peliculas / juegos", "Revision de la semana"],
      mensuales: ["Cena especial / salida sorpresa", "Revision del manual", "Noche de agradecimientos y metas"],
      anuales: ["Celebracion de aniversario", "Viaje o escapada juntos", "Carta de amor anual"]
    };

    const quarters = {
      t1: "Trimestre 1",
      t2: "Trimestre 2",
      t3: "Trimestre 3",
      t4: "Trimestre 4"
    };

    const reviewQuestions = [
      "Que funciono muy bien este trimestre",
      "Que necesitamos mejorar",
      "Que seccion del manual queremos actualizar",
      "Comunicacion (1-10)",
      "Conexion emocional (1-10)",
      "Vida intima (1-10)",
      "Meta principal para el proximo trimestre",
      "Fecha de la proxima revision",
      "Firma Persona 1",
      "Firma Persona 2"
    ];

    const dashboardAreas = [
      "Comunicacion", "Amor / Afecto", "Trabajo en equipo", "Diversion / Risas",
      "Intimidad / Conexion", "Apoyo a metas", "Manejo de conflictos",
      "Convivencia", "Economia de pareja", "Crecimiento conjunto"
    ];

    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const bucketGroups = ["Viajes y aventuras", "Experiencias y actividades", "Metas del hogar / vida juntos", "Crecimiento personal y de pareja", "Detalles y sorpresas pendientes"];

    const sections = [
      { id: "portada", icon: "💕", title: "Portada", subtitle: "Datos principales, version, lugar y firmas.", render: renderCover },
      { id: "perfiles", icon: "🧬", title: "Perfiles de pareja", subtitle: "Dos mapas personales para conocerse con ternura y claridad.", render: renderProfiles },
      { id: "mision", icon: "🎯", title: "Mision y vision", subtitle: "Proposito, futuro, valores y metas compartidas.", render: renderMission },
      { id: "conflictos", icon: "⚡", title: "Protocolo de conflictos", subtitle: "Reglas para hablar cuando la emocion sube.", render: renderConflict },
      { id: "lenguajes", icon: "💝", title: "Lenguajes del amor", subtitle: "Necesidades, detalles y formas concretas de cuidarse.", render: renderLove },
      { id: "acuerdos", icon: "🏠", title: "Acuerdos de convivencia", subtitle: "Tiempo, hogar, finanzas, privacidad, familia y amigos.", render: renderAgreements },
      { id: "limites", icon: "🚩", title: "Limites", subtitle: "Banderas rojas, razones y consecuencias acordadas.", render: renderBoundaries },
      { id: "rituales", icon: "🕯️", title: "Rituales de conexion", subtitle: "Habitos diarios, semanales, mensuales y anuales.", render: renderRituals },
      { id: "rastreador", icon: "📊", title: "Rastreador mensual", subtitle: "Registro con humor, aprendizaje y reparacion.", render: renderTracker },
      { id: "revision", icon: "🔄", title: "Revision trimestral", subtitle: "Preguntas para actualizar el manual cada tres meses.", render: renderQuarterly },
      { id: "dashboard", icon: "📈", title: "Dashboard de amor", subtitle: "Termometro mensual de salud relacional.", render: renderDashboard },
      { id: "agradecimientos", icon: "🙏", title: "Agradecimientos", subtitle: "Mensajes mensuales y registro de palabras de amor.", render: renderThanks },
      { id: "bucket", icon: "✈️", title: "Bucket list", subtitle: "Suenos, experiencias, planes y detalles pendientes.", render: renderBucket },
      { id: "contrato", icon: "📜", title: "Contrato de amor", subtitle: "Declaracion final, fecha y firmas.", render: renderContract }
    ];

    const defaults = {
      portada: {
        persona1: { nombre: "", nacimiento: "", amo: "", compromiso: "" },
        persona2: { nombre: "Sara Velasquez Avendano", nacimiento: "2005-01-08", amo: "Tu inteligencia", compromiso: "Aprender a entenderte y amar la version real de ti" },
        documento: { fecha: "2026-05-03", version: "1.0", lugar: "Medellin, Antioquia", revision: "2026-06-03" }
      },
      perfiles: {
        persona1: blankObject(profileFields.map(f => f[0])),
        persona2: { ...blankObject(profileFields.map(f => f[0])), personalidad: "Sensible\nAnsiosa\nTimida" }
      },
      mision: { mision: "", vision: "", valores: "", metas2025: "", metas2026: "" },
      conflictos: {
        solucion: "",
        reconexion: "",
        prohibidas: ["Siempre haces lo mismo / Nunca cambias", "Entonces terminemos / ya no te quiero", "Eres igual que alguien del pasado", "No me importa / Como quieras", "Insultos, gritos, golpes o amenazas", "Sacar trapos sucios ya resueltos"]
      },
      lenguajes: {
        persona1: loveDefault(),
        persona2: loveDefault()
      },
      acuerdos: mapGroups(agreementGroups, item => ({ tema: item, p1: "", p2: "", estado: "Pendiente" })),
      limites: {
        items: [{ limite: "", razon: "", persona: "Ambos" }],
        consecuencia: ""
      },
      rituales: mapGroups(ritualGroups, item => ({ ritual: item, detalle: "", responsable: "Ambos", estado: "Pendiente" })),
      rastreador: {
        mes: "", anio: "2026",
        items: Array.from({ length: 15 }, (_, i) => ({ numero: i + 1, que: "", quien: "", nivel: "", resuelto: "Pendiente", aprendizaje: "" })),
        resumen: { record: "", frecuente: "", perdon: "", nota: "", compromiso: "" }
      },
      revision: Object.fromEntries(Object.keys(quarters).map(q => [q, Object.fromEntries(reviewQuestions.map(x => [slug(x), { p1: "", p2: "" }]))])),
      dashboard: Object.fromEntries(["mes1", "mes2", "mes3", "mes4", "mes5", "mes6"].map(m => [m, Object.fromEntries(dashboardAreas.map(a => [slug(a), { p1: "", p2: "" }]))])),
      agradecimientos: {
        meses: Object.fromEntries(months.map(m => [slug(m), { p1: "", p2: "" }])),
        palabras: Object.fromEntries(["Palabras de amor", "Agradecimientos", "Palabras de aliento", "Disculpas sinceras", "Cumplidos", "Palabras de admiracion"].map(m => [slug(m), { p1: "", p2: "" }]))
      },
      bucket: Object.fromEntries(bucketGroups.map(g => [slug(g), Array.from({ length: 5 }, () => ({ sueno: "", cuando: "", presupuesto: "", cumplido: "No" }))])),
      contrato: { persona1: "", persona2: "Sara Velasquez Avendano", fecha: "", lugar: "Medellin, Antioquia", nota: "" }
    };

    let state = mergeDeep(structuredClone(defaults), loadState());
    let activeSection = "portada";

    function blankObject(keys) {
      return Object.fromEntries(keys.map(k => [k, ""]));
    }

    function loveDefault() {
      return {
        tanque: "5", ultimaVez: "", necesita: "",
        afirmacion: "", frecuenciaAfirmacion: "", masAfirmacion: "",
        regalos: "", presupuesto: "", ideas: "",
        contacto: "", contactoCuando: "", contactoNo: "",
        tiempo: "", cita: "", arruina: "",
        servicio: "", sorpresa: "", ayuda: ""
      };
    }

    function mapGroups(groups, mapper) {
      return Object.fromEntries(Object.entries(groups).map(([key, rows]) => [key, rows.map(mapper)]));
    }

    function slug(value) {
      return value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "");
    }

    function get(path) {
      return path.split(".").reduce((acc, key) => acc?.[key], state);
    }

    function set(path, value) {
      const keys = path.split(".");
      let target = state;
      keys.slice(0, -1).forEach(key => target = target[key]);
      target[keys.at(-1)] = value;
      saveState();
      updateProgress();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function mergeDeep(base, patch) {
      Object.entries(patch || {}).forEach(([key, value]) => {
        if (value && typeof value === "object" && !Array.isArray(value) && base[key] && typeof base[key] === "object" && !Array.isArray(base[key])) {
          mergeDeep(base[key], value);
        } else {
          base[key] = value;
        }
      });
      return base;

      const nav = document.getElementById("nav");
      nav.innerHTML = sections.map(s => `<button data-section="${s.id}" class="${s.id === activeSection ? "active" : ""}"><span>${s.icon}</span><span>${s.title}</span></button>`).join("");
      nav.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
        activeSection = btn.dataset.section;
        renderApp();
      }));

      const holder = document.getElementById("sections");
      holder.innerHTML = sections.map(s => `
        <section class="section ${s.id === activeSection ? "active" : ""}" id="section-${s.id}">
          <div class="section-head">
            <h2>${s.icon} ${s.title}</h2>
            <p>${s.subtitle}</p>
          </div>
          ${s.render()}
        </section>
      `).join("");
      bindInputs();
      updateProgress();
    }

    function field(path, labelText, type = "text", attrs = {}) {
      const value = get(path) ?? "";
      if (type === "textarea") {
        return `<label>${labelText}<textarea data-path="${path}" rows="${attrs.rows || 4}">${escapeHtml(value)}</textarea></label>`;
      }
      if (type === "select") {
        const options = attrs.options || [];
        return `<label>${labelText}<select data-path="${path}">${options.map(opt => `<option ${String(value) === String(opt) ? "selected" : ""}>${escapeHtml(opt)}</option>`).join("")}</select></label>`;
      }
      if (type === "range") {
        return `<label>${labelText}<span class="range-wrap"><input data-path="${path}" type="range" min="${attrs.min || 1}" max="${attrs.max || 10}" value="${escapeHtml(value || attrs.min || 1)}"><span class="range-value">${escapeHtml(value || attrs.min || 1)}</span></span></label>`;
      }
      return `<label>${labelText}<input data-path="${path}" type="${type}" value="${escapeHtml(value)}"></label>`;
    }

    function bindInputs() {
      document.querySelectorAll("[data-path]").forEach(input => {
        input.addEventListener("input", event => {
          set(input.dataset.path, event.target.value);
          if (input.type === "range") input.nextElementSibling.textContent = event.target.value;
          if (activeSection === "dashboard") renderKpis();
        });
      });
      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", () => handleAction(btn.dataset.action, btn.dataset.group, btn.dataset.index));
      });
    }

    function handleAction(action, group, index) {
      if (action === "addForbidden") state.conflictos.prohibidas.push("");
      if (action === "removeForbidden") state.conflictos.prohibidas.splice(Number(index), 1);
      if (action === "addBoundary") state.limites.items.push({ limite: "", razon: "", persona: "Ambos" });
      if (action === "removeBoundary") state.limites.items.splice(Number(index), 1);
      saveState();
      renderApp();
    }

    function updateProgress() {
      const values = flattenValues(state).filter(v => typeof v !== "number");
      const fillable = values.filter(v => String(v ?? "").trim() !== "" || v === "");
      const filled = fillable.filter(v => String(v ?? "").trim() !== "").length;
      const pct = fillable.length ? Math.round((filled / fillable.length) * 100) : 0;
      document.getElementById("progressLabel").textContent = `${pct}% completado`;
      document.getElementById("progressBar").style.width = `${pct}%`;
      renderKpis();
    }

    function flattenValues(value) {
      if (Array.isArray(value)) return value.flatMap(flattenValues);
      if (value && typeof value === "object") return Object.values(value).flatMap(flattenValues);
      return [value];
    }

    function average(list) {
      if (!list.length) return "";
      return (list.reduce((a, b) => a + b, 0) / list.length).toFixed(1);
    }

    function activeMonths() {
      return Object.values(state.dashboard).filter(month => Object.values(month).some(v => Number(v.p1) || Number(v.p2))).length;
    }

    function titleCase(value) {
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function titleFromSlug(value) {
      return value.split("_").map(titleCase).join(" ");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      download("manual-convivencia-datos.json", JSON.stringify(state, null, 2), "application/json");
      toast("JSON descargado");
    }

    function exportCsv() {
      const rows = [["seccion", "campo", "valor"]];
      collectCsv(state, [], rows);
      const csv = rows.map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
      download("manual-convivencia-datos.csv", csv, "text/csv;charset=utf-8");
      toast("CSV descargado");
    }

    function collectCsv(value, path, rows) {
      if (Array.isArray(value)) return value.forEach((v, i) => collectCsv(v, [...path, i + 1], rows));
      if (value && typeof value === "object") return Object.entries(value).forEach(([k, v]) => collectCsv(v, [...path, k], rows));
      rows.push([path[0] || "", path.slice(1).join("."), value ?? ""]);
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state = mergeDeep(structuredClone(defaults), JSON.parse(reader.result));
          saveState();
          renderApp();
          toast("Datos importados");
        } catch {
          toast("El archivo no se pudo leer");
        }
      };
      reader.readAsText(file);
    }

    function printDl(title, pairs) {
      const rows = pairs.filter(([, v]) => String(v ?? "").trim()).map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(v)}</dd>`).join("");
      return rows ? `<h2>${escapeHtml(title)}</h2><dl>${rows}</dl>` : "";
    }

    function printTable(title, headers, rows) {
      if (!rows.length) return "";
      return `<h2>${escapeHtml(title)}</h2><table><thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    }

    function printGroupedTables(title, groups, headers, mapper) {
      const parts = Object.entries(groups).map(([name, rows]) => {
        const filtered = rows.filter(row => mapper(row).some(v => String(v ?? "").trim()));
        return filtered.length ? `<h3>${titleFromSlug(name)}</h3>${printTable("", headers, filtered.map(mapper))}` : "";
      }).join("");
      return parts ? `<h2>${escapeHtml(title)}</h2>${parts}` : "";
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => el.classList.remove("show"), 1800);
    }

    document.getElementById("exportJsonBtn").addEventListener("click", exportJson);
    document.getElementById("exportCsvBtn").addEventListener("click", exportCsv);
    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", e => e.target.files[0] && importJson(e.target.files[0]));
    document.getElementById("printBtn").addEventListener("click", () => {
      buildPrintView();
      window.print();
    });
    document.getElementById("previewBtn").addEventListener("click", () => {
      const opened = window.open("", "_blank");
      if (!opened) return toast("Activa ventanas emergentes");
      opened.document.write(`<!doctype html><html><head><title>Vista del manual</title><style>${document.querySelector("style").textContent}</style></head><body><div id="printView" style="display:block">${buildPrintView()}</div></body></html>`);
      opened.document.close();
    });

    renderApp();
  </script>
</body>
</html>
