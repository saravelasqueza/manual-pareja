<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Manual de Convivencia y Conexión</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --cream: #FAF6F0; --rose: #C9715A; --rose-light: #F2DDD6;
  --burgundy: #7A2D3B; --gold: #C9963A; --gold-light: #F5ECD9;
  --sage: #6B8F71; --sage-light: #DFF0E1; --plum: #5C3D6E;
  --plum-light: #EAE0F5; --text: #2C1A1A; --text-muted: #7A6060;
  --white: #FFFFFF; --border: #E8DDD5; --shadow: 0 4px 24px rgba(122,45,59,0.08);
}
body { background-color: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
header { text-align: center; margin-bottom: 50px; padding-bottom: 30px; border-bottom: 2px double var(--border); }
h1 { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 2.8rem; margin: 0 0 10px 0; }
h2 { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.8rem; margin-top: 0; border-left: 4px solid var(--rose); padding-left: 15px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 40px; }
.section { background: var(--white); padding: 30px; border-radius: 20px; border: 1px solid var(--border); transition: all 0.3s ease; }
.section:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(122,45,59,0.12); }
label { display: block; margin-bottom: 10px; font-weight: 500; color: var(--burgundy); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
textarea, input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; background: var(--cream); font-family: inherit; font-size: 1rem; transition: 0.3s; box-sizing: border-box; }
textarea:focus, input:focus { outline: none; border-color: var(--rose); background: var(--white); box-shadow: 0 0 0 4px var(--rose-light); }
.chart-container { position: relative; height: 300px; margin: 20px 0; }
.btn-save { background: var(--burgundy); color: white; border: none; padding: 20px 40px; border-radius: 16px; cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; transition: 0.4s; margin-top: 30px; box-shadow: 0 4px 15px rgba(122,45,59,0.2); }
.btn-save:hover { background: var(--rose); transform: scale(1.02); }
#status-msg { text-align: center; margin-top: 15px; font-weight: 500; color: var(--rose); min-height: 24px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📜 Nuestro Manual de Conexión</h1>
    <p>Un espacio vivo para entendernos, cuidarnos y crecer juntos.</p>
  </header>

  <div class="grid">
    <div class="section">
      <h2>Nuestra Identidad</h2>
      <label>Nosotros somos</label>
      <input type="text" id="nosotros_nombres" placeholder="Nombres">
      <label>Desde el día</label>
      <input type="text" id="nosotros_fecha" placeholder="Fecha especial">
      <label>Nuestra frase</label>
      <textarea id="nosotros_frase" rows="2"></textarea>
    </div>

    <div class="section">
      <h2>Lenguajes del Amor</h2>
      <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">Valores del 1 al 10 separados por comas: Palabras, Tiempo, Regalos, Actos, Contacto</p>
      <label>Persona 1</label>
      <input type="text" id="radar_p1" placeholder="Ej: 8,9,5,7,10" oninput="updateRadar()">
      <label>Persona 2</label>
      <input type="text" id="radar_p2" placeholder="Ej: 7,10,4,8,6" oninput="updateRadar()">
      <div class="chart-container"><canvas id="radar-chart"></canvas></div>
    </div>
  </div>

  <div class="grid">
    <div class="section">
      <h2>Termómetro de Bienestar</h2>
      <label>Niveles de energía (semana)</label>
      <input type="text" id="line_p1" placeholder="P1: 5,7,8,4,6" oninput="updateLine()">
      <input type="text" id="line_p2" placeholder="P2: 6,5,9,7,8" oninput="updateLine()">
      <div class="chart-container"><canvas id="line-chart"></canvas></div>
    </div>

    <div class="section">
      <h2>Nuestras Palabras</h2>
      <label>Frecuencia de expresiones (Números)</label>
      <input type="text" id="pie_vals" placeholder="6 números ej: 10,5,8,12,4,7" oninput="updatePie()">
      <div class="chart-container"><canvas id="pie-chart"></canvas></div>
    </div>
  </div>

  <div class="section">
    <h2>Acuerdos de Convivencia</h2>
    <label>¿Cómo manejamos los días difíciles?</label>
    <textarea id="acuerdo_dias" rows="4"></textarea>
    <label>Nuestros límites innegociables</label>
    <textarea id="acuerdo_limites" rows="4"></textarea>
  </div>

  <button class="btn-save" onclick="saveAll()">✨ Guardar Manual para Ambos</button>
  <div id="status-msg"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrsWiGpq9iExHHFDsvwDM-x6hk9KysydIF7WBa8fdaajW0-jja1CbBQ3AAlAoseN2_/exec";

// --- LÓGICA DE GRÁFICAS ---
let radarInst, lineInst, pieInst;

function updateRadar() {
  const ctx = document.getElementById('radar-chart');
  const d1 = document.getElementById('radar_p1').value.split(',').map(Number);
  const d2 = document.getElementById('radar_p2').value.split(',').map(Number);
  if(radarInst) radarInst.destroy();
  radarInst = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['Palabras', 'Tiempo', 'Regalos', 'Actos', 'Contacto'],
      datasets: [
        {label: 'P1', data: d1, borderColor: '#C9715A', backgroundColor: 'rgba(201,113,90,0.2)'},
        {label: 'P2', data: d2, borderColor: '#5C3D6E', backgroundColor: 'rgba(92,61,110,0.2)'}
      ]
    },
    options: { scales: { r: { min: 0, max: 10 } } }
  });
}

function updateLine() {
  const ctx = document.getElementById('line-chart');
  const d1 = document.getElementById('line_p1').value.split(',').map(Number);
  const d2 = document.getElementById('line_p2').value.split(',').map(Number);
  if(lineInst) lineInst.destroy();
  lineInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
      datasets: [
        {label: 'P1', data: d1, borderColor: '#C9715A', tension: 0.4},
        {label: 'P2
