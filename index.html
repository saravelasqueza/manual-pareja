<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Nuestro Manual de Conexión</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* Estilos originales preservados */
:root {
  --cream: #FAF6F0; --rose: #C9715A; --rose-light: #F2DDD6;
  --burgundy: #7A2D3B; --gold: #C9963A; --text: #2C1A1A;
  --white: #FFFFFF; --shadow: 0 4px 24px rgba(122,45,59,0.08);
}
body { background-color: var(--cream); font-family: 'DM+Sans', sans-serif; color: var(--text); margin: 0; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: 20px; box-shadow: var(--shadow); }
h1 { font-family: 'Playfair Display'; color: var(--burgundy); text-align: center; }
.section { margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 15px; }
label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--burgundy); }
textarea, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
button { background: var(--rose); color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
button:hover { background: var(--burgundy); }
#status { text-align: center; margin-top: 10px; font-size: 14px; color: var(--rose); }
.chart-container { height: 300px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container">
    <h1>💕 Nuestro Manual de Conexión</h1>
    <p style="text-align:center">Lo que escribas aquí se guardará para ambos en tiempo real.</p>

    <div class="section">
        <label>Nuestros Nombres</label>
        <input type="text" id="nombres_pareja" placeholder="Ej: Sara y Juan">
        
        <label>¿Qué es lo que más te gusta de nuestra relación?</label>
        <textarea id="lo_que_mas_gusta" rows="3"></textarea>
    </div>

    <div class="section">
        <label>Lenguajes del Amor (Persona 1)</label>
        <input type="text" id="lang_p1" placeholder="Ej: Palabras de afirmación, Tiempo de calidad">
        
        <label>Lenguajes del Amor (Persona 2)</label>
        <input type="text" id="lang_p2" placeholder="Ej: Actos de servicio, Regalos">
    </div>

    <div class="section">
        <label>Acuerdos Importantes</label>
        <textarea id="acuerdos" rows="5" placeholder="Escribe aquí nuestros compromisos..."></textarea>
    </div>

    <button onclick="saveToCloud()">✨ Guardar para Ambos</button>
    <div id="status"></div>
</div>

<script>
// URL de tu Google Script
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrsWiGpq9iExHHFDsvwDM-x6hk9KysydIF7WBa8fdaajW0-jja1CbBQ3AAlAoseN2_/exec";

// Función para guardar datos en Google Sheets
async function saveToCloud() {
    const status = document.getElementById('status');
    status.innerText = "Guardando en la nube... ☁️";
    
    const data = {};
    document.querySelectorAll('input, textarea').forEach(el => {
        if (el.id) data[el.id] = el.value;
    });

    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify(data)
        });
        status.innerText = "¡Guardado con éxito! ❤️ Ambos verán esto al recargar.";
        setTimeout(() => status.innerText = "", 5000);
    } catch (e) {
        console.error(e);
        status.innerText = "Error al guardar. Inténtalo de nuevo.";
    }
}

// Función para cargar datos desde Google Sheets
async function loadFromCloud() {
    const status = document.getElementById('status');
    status.innerText = "Cargando memorias... ✨";
    
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        if (data) {
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = data[id];
            });
            status.innerText = "Datos actualizados";
        }
    } catch (e) {
        console.log("Iniciando manual nuevo o error de conexión.");
        status.innerText = "";
    }
}

// Cargar datos automáticamente al abrir la página
window.onload = loadFromCloud;
</script>

</body>
</html>
